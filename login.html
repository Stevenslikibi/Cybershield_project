<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberShield - Connexion</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>

  <div class="login-box">
    <h1>🛡️ CyberShield</h1>
    <h2>Espace Enquêteurs</h2>

    <form id="form-login">

      <label>Email</label>
      <input type="email" name="email" placeholder="votre@email.com" required>

      <label>Mot de passe</label>
      <input type="password" name="mot_de_passe" placeholder="••••••••" required>

      <p id="erreur" style="color:red; display:none">Email ou mot de passe incorrect.</p>

      <button type="submit">Se connecter</button>

    </form>
  </div>

  <script>
    document.getElementById('form-login').addEventListener('submit', function(e) {
      e.preventDefault();

      var email = this.email.value;
      var mot_de_passe = this.mot_de_passe.value;

      fetch('http://localhost:3000/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, mot_de_passe: mot_de_passe })
      })
      .then(function(response) {
        return response.json();
      })
      .then(function(data) {
        if (data.token) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('enqueteur', JSON.stringify(data.enqueteur));
          window.location.href = 'dashboard.html';
        } else {
          document.getElementById('erreur').style.display = 'block';
        }
      })
      .catch(function() {
        document.getElementById('erreur').style.display = 'block';
      });
    });
  </script>

</body>
</html>
